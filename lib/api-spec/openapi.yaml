openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Newsletter Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: dashboard
    description: Newsletter dashboard operations
  - name: channels
    description: Tracked YouTube channel management
  - name: transcriber
    description: On-demand podcast transcription and summarisation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard/runs:
    get:
      operationId: getDashboardRuns
      tags: [dashboard]
      summary: Get all newsletter runs
      description: Fetches run data from the VPS and returns it keyed by date
      responses:
        "200":
          description: Run data keyed by date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunsData"
        "502":
          description: Unable to reach VPS
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/gmail/{date}:
    get:
      operationId: getGmailStatus
      tags: [dashboard]
      summary: Check Gmail for a date
      description: Checks Gmail INBOX and Spam for an AI Podcast Digest email on a given date
      parameters:
        - name: date
          in: path
          required: true
          schema:
            type: string
            description: ISO date string (YYYY-MM-DD)
      responses:
        "200":
          description: Gmail check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GmailStatus"

  /channels:
    get:
      operationId: getChannels
      tags: [channels]
      summary: List tracked channels
      description: Returns all YouTube channels configured for monitoring
      responses:
        "200":
          description: List of tracked channels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrackedChannel"
    post:
      operationId: createChannel
      tags: [channels]
      summary: Add a tracked channel
      description: Adds a new YouTube channel to the monitoring list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChannelBody"
      responses:
        "201":
          description: Channel created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackedChannel"
        "409":
          description: Channel already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /channels/validate:
    get:
      operationId: validateChannel
      tags: [channels]
      summary: Validate a YouTube channel before adding
      description: Resolves the channel name and fetches recent videos via YouTube RSS. Returns videos from the last 14 days, falling back to 90 days if none found.
      parameters:
        - name: handle
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            description: Parsed YouTube handle (e.g. @SemiAnalysis) or channel ID (e.g. UCxxxxxx)
      responses:
        "200":
          description: Channel validated with recent videos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelValidation"
        "400":
          description: Missing or invalid handle parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Channel not found or no recent videos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Unable to reach YouTube
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /channels/channels-json:
    get:
      operationId: getChannelsJson
      tags: [channels]
      summary: Generate VPS channels.json
      description: Resolves UC channel IDs for all tracked channels and returns the channels.json object ready to deploy to the VPS scraper.
      responses:
        "200":
          description: channels.json object mapping @handle to UCxxxxxx channel ID
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
        "500":
          description: Failed to generate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /channels/{id}:
    patch:
      operationId: updateChannel
      tags: [channels]
      summary: Update a tracked channel
      description: Updates mutable fields (currently scraperName) on a tracked channel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateChannelBody"
      responses:
        "200":
          description: Channel updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackedChannel"
        "404":
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteChannel
      tags: [channels]
      summary: Remove a tracked channel
      description: Removes a YouTube channel from the monitoring list
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Channel deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackedChannel"
        "404":
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transcriber/transcript:
    post:
      operationId: transcribeVideo
      tags: [transcriber]
      summary: Fetch transcript for a YouTube video
      description: Fetches the caption track and video metadata (title, thumbnail) from YouTube
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TranscribeVideoBody"
      responses:
        "200":
          description: Transcript and video metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranscriptResult"
        "400":
          description: Invalid YouTube URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No caption track found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Unable to reach YouTube
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transcriber/summary:
    post:
      operationId: summariseTranscript
      tags: [transcriber]
      summary: Generate AI summary from a transcript
      description: Sends the transcript to Claude and returns a 4-6 paragraph summary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SummariseTranscriptBody"
      responses:
        "200":
          description: AI-generated summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummaryResult"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: AI service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transcriber/notion:
    post:
      operationId: pushToNotion
      tags: [transcriber]
      summary: Push transcript and summary to Notion
      description: Creates a new page in the configured Notion podcast database
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushToNotionBody"
      responses:
        "200":
          description: Notion page created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotionResult"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Notion API unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      description: Returns high-level stats about newsletter runs
      responses:
        "200":
          description: Summary statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
        "502":
          description: Unable to reach VPS
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    VideoRecord:
      type: object
      properties:
        title:
          type: string
        url:
          type: string
        channel:
          type: string
        transcript:
          type: ["string", "null"]
        transcript_error:
          type: ["string", "null"]
      required:
        - title
        - url
        - channel
        - transcript

    RunRecord:
      type: object
      properties:
        total_videos:
          type: integer
        email_sent:
          type: boolean
        videos:
          type: array
          items:
            $ref: "#/components/schemas/VideoRecord"
      required:
        - total_videos
        - email_sent
        - videos

    RunsData:
      type: object
      description: Map of ISO date strings to arrays of RunRecord
      additionalProperties:
        type: array
        items:
          $ref: "#/components/schemas/RunRecord"

    GmailStatus:
      type: object
      properties:
        date:
          type: string
        found:
          type: ["boolean", "null"]
          description: true if email found, false if not found, null if Gmail check failed
        unavailable:
          type: boolean
          description: true if Gmail credentials are not configured
      required:
        - date
        - found
        - unavailable

    TrackedChannel:
      type: object
      properties:
        id:
          type: integer
        displayName:
          type: string
        youtubeHandle:
          type: string
          description: The @handle as typed by the user (e.g. @SemiAnalysis)
        channelId:
          type: string
          nullable: true
          description: Resolved UCxxxxxx channel ID used for RSS feeds and VPS channels.json
        scraperName:
          type: string
          nullable: true
          description: Exact channel name string reported by the VPS scraper (used to match against telemetry data)
        avatarUrl:
          type: string
          nullable: true
          description: YouTube channel avatar image URL
        description:
          type: string
          nullable: true
          description: YouTube channel description
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - displayName
        - youtubeHandle
        - channelId
        - scraperName
        - avatarUrl
        - description
        - createdAt

    CreateChannelBody:
      type: object
      properties:
        displayName:
          type: string
          minLength: 1
        youtubeHandle:
          type: string
          minLength: 1
          description: The @handle as typed by the user (e.g. @SemiAnalysis)
        channelId:
          type: string
          nullable: true
          description: Resolved UCxxxxxx channel ID
        scraperName:
          type: string
          nullable: true
          description: Optional exact channel name string as reported by the VPS scraper
        avatarUrl:
          type: string
          nullable: true
          description: YouTube channel avatar image URL
        description:
          type: string
          nullable: true
          description: YouTube channel description
      required:
        - displayName
        - youtubeHandle

    UpdateChannelBody:
      type: object
      properties:
        scraperName:
          type: string
          nullable: true
          description: Exact channel name string reported by the VPS scraper; set to null to clear

    ChannelVideo:
      type: object
      properties:
        title:
          type: string
        url:
          type: string
        publishedAt:
          type: string
          format: date-time
      required:
        - title
        - url
        - publishedAt

    ChannelValidation:
      type: object
      properties:
        channelName:
          type: string
          nullable: true
          description: Real display name resolved from YouTube RSS feed
        youtubeHandle:
          type: string
          description: Resolved channel ID (UCxxxxxx) used to fetch RSS
        avatarUrl:
          type: string
          nullable: true
          description: YouTube channel avatar image URL
        description:
          type: string
          nullable: true
          description: YouTube channel description
        lookbackDays:
          type: integer
          description: Window used — 14 if videos found in last 14 days, otherwise 90
        videos:
          type: array
          items:
            $ref: "#/components/schemas/ChannelVideo"
      required:
        - channelName
        - youtubeHandle
        - avatarUrl
        - description
        - lookbackDays
        - videos

    TranscriptLine:
      type: object
      properties:
        offset:
          type: number
          description: Start time in seconds
        text:
          type: string
      required:
        - offset
        - text

    TranscribeVideoBody:
      type: object
      properties:
        youtubeUrl:
          type: string
          description: YouTube video URL (youtube.com/watch?v= or youtu.be/)
      required:
        - youtubeUrl

    TranscriptResult:
      type: object
      properties:
        videoId:
          type: string
        title:
          type: string
        thumbnailUrl:
          type: string
          nullable: true
        lines:
          type: array
          items:
            $ref: "#/components/schemas/TranscriptLine"
      required:
        - videoId
        - title
        - thumbnailUrl
        - lines

    SummariseTranscriptBody:
      type: object
      properties:
        videoId:
          type: string
          description: YouTube video ID — used for server-side summary caching
        title:
          type: string
        lines:
          type: array
          items:
            $ref: "#/components/schemas/TranscriptLine"
      required:
        - title
        - lines

    SummaryResult:
      type: object
      properties:
        summary:
          type: string
      required:
        - summary

    PushToNotionBody:
      type: object
      properties:
        videoId:
          type: string
        title:
          type: string
        youtubeUrl:
          type: string
        thumbnailUrl:
          type: string
          nullable: true
        summary:
          type: string
        lines:
          type: array
          items:
            $ref: "#/components/schemas/TranscriptLine"
      required:
        - videoId
        - title
        - youtubeUrl
        - thumbnailUrl
        - summary
        - lines

    NotionResult:
      type: object
      properties:
        notionPageUrl:
          type: string
      required:
        - notionPageUrl

    DashboardSummary:
      type: object
      properties:
        totalRuns:
          type: integer
        last30DaysRuns:
          type: integer
        last30DaysEmailsSent:
          type: integer
        last30DaysTranscriptRate:
          type: number
          description: Fraction of videos successfully transcribed in last 30 days (0-1)
        totalVideosProcessed:
          type: integer
      required:
        - totalRuns
        - last30DaysRuns
        - last30DaysEmailsSent
        - last30DaysTranscriptRate
        - totalVideosProcessed
